<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Scam website signs — misleading social ad and alert">
  <defs>
    <linearGradient id="topwarningsignsofascamwebsite-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="45%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="topwarningsignsofascamwebsite-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="topwarningsignsofascamwebsite-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="topwarningsignsofascamwebsite-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.08"/>
    </filter>
    <filter id="topwarningsignsofascamwebsite-shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#334155" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#topwarningsignsofascamwebsite-bg)"/>
  <ellipse cx="920" cy="120" rx="200" ry="160" fill="#8b5cf6" fill-opacity="0.06"/>
  <ellipse cx="180" cy="520" rx="240" ry="180" fill="#3b82f6" fill-opacity="0.07"/>
  <ellipse cx="600" cy="80" rx="120" ry="80" fill="#10b981" fill-opacity="0.08"/>
  
  <g filter="url(#topwarningsignsofascamwebsite-shadow)">
    <!-- Social ad card -->
    <rect x="280" y="90" width="400" height="440" rx="24" fill="url(#topwarningsignsofascamwebsite-card)" stroke="#c7d2fe" stroke-width="2"/>
    <circle cx="330" cy="140" r="24" fill="url(#topwarningsignsofascamwebsite-accent)" fill-opacity="0.2"/>
    <circle cx="330" cy="140" r="24" fill="none" stroke="url(#topwarningsignsofascamwebsite-accent)" stroke-width="2"/>
    <text x="370" y="136" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#0f172a">Sponsored</text>
    <text x="370" y="156" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8">2h ago · Ad</text>

    <!-- Ad creative -->
    <rect x="310" y="175" width="340" height="180" rx="16" fill="url(#topwarningsignsofascamwebsite-accent)" fill-opacity="0.1" stroke="#e2e8f0" stroke-width="1"/>
    <text x="480" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#8b5cf6">LIMITED OFFER</text>
    <text x="480" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#ef4444">90% OFF</text>

    <!-- Discount lure tag -->
    <g transform="translate(520,165) rotate(6)">
      <rect width="100" height="36" rx="8" fill="#ef4444" filter="url(#topwarningsignsofascamwebsite-shadow-sm)"/>
      <text x="12" y="24" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#fff">TODAY ONLY</text>
    </g>

    <rect x="310" y="375" width="340" height="48" rx="12" fill="url(#topwarningsignsofascamwebsite-accent)" fill-opacity="0.2"/>
    <text x="480" y="406" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#3b82f6">Shop now →</text>

    <rect x="310" y="440" width="200" height="12" rx="4" fill="#e2e8f0"/>
    <rect x="310" y="462" width="140" height="12" rx="4" fill="#e2e8f0"/>
  </g>

  <!-- Alert marker panel -->
  <g transform="translate(740,130)" filter="url(#topwarningsignsofascamwebsite-shadow-sm)">
    <rect width="260" height="360" rx="22" fill="#fff" stroke="#c7d2fe" stroke-width="2"/>
    <text x="24" y="44" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Red flags</text>

    <g transform="translate(24,70)">
      <rect width="212" height="52" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
      <circle cx="26" cy="26" r="14" fill="#ef4444" fill-opacity="0.15"/>
      <text x="26" y="31" text-anchor="middle" font-size="16" fill="#ef4444">!</text>
      <text x="50" y="32" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#0f172a">Extreme discount</text>
    </g>
    <g transform="translate(24,140)">
      <rect width="212" height="52" rx="12" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
      <circle cx="26" cy="26" r="14" fill="#f59e0b" fill-opacity="0.2"/>
      <text x="26" y="31" text-anchor="middle" font-size="16" fill="#f59e0b">!</text>
      <text x="50" y="32" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#0f172a">New domain</text>
    </g>
    <g transform="translate(24,210)">
      <rect width="212" height="52" rx="12" fill="#eff6ff" stroke="#c7d2fe" stroke-width="1"/>
      <circle cx="26" cy="26" r="14" fill="#3b82f6" fill-opacity="0.15"/>
      <text x="26" y="31" text-anchor="middle" font-size="16" fill="#3b82f6">!</text>
      <text x="50" y="32" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#0f172a">Urgency pressure</text>
    </g>
    <g transform="translate(24,280)">
      <rect width="212" height="52" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
      <text x="20" y="32" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#10b981">✓ Check with Fraudly</text>
    </g>
  </g>

  <g transform="translate(300,555)">
    <rect width="118" height="28" rx="14" fill="#3b82f6" fill-opacity="0.1" stroke="#c7d2fe" stroke-width="1"/>
    <circle cx="16" cy="14" r="6" fill="url(#topwarningsignsofascamwebsite-accent)"/>
    <text x="28" y="18" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.04em">FRAUDLY</text>
  </g>
  <text x="600" y="600" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">Scam Intelligence</text>
</svg>